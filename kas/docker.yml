# KAS overlay — Docker / CI cache path overrides
#
# Usage (appended after the target config):
#   kas build kas/rpi5-64.yml:kas/docker.yml
#   kas build kas/rpi5-xenomai.yml:kas/docker.yml
#   kas build kas/qemu-x86-64.yml:kas/docker.yml
#
# Redirects DL_DIR and SSTATE_DIR to the Docker-volume-backed /build-cache/
# for fast I/O (bypasses the slow virtio-fs Windows ↔ WSL2 boundary).

header:
  version: 14

local_conf_header:
  # Hard-assign (= not ?=) so these override the ?= defaults in base.yml
  docker_cache: |
    DL_DIR    = "/build-cache/downloads"
    SSTATE_DIR = "/build-cache/sstate-cache"
