# KAS base configuration — repos and settings shared by all build targets
# Docs: https://kas.readthedocs.io
header:
  version: 14

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    branch: scarthgap
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: git@github.com:openembedded/meta-openembedded
    branch: scarthgap
    layers:
      meta-oe:
      meta-networking:
      meta-python:
      meta-filesystems:

  meta-cclrte:
    path: layers/meta-cclrte
    layers:
      .:

local_conf_header:
  base: |
    DISTRO = "cclrte"

    # Init manager — systemd only, sysvinit removed
    DISTRO_FEATURES:append = " systemd"
    VIRTUAL-RUNTIME_init_manager = "systemd"
    DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"
    VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

    EXTRA_IMAGE_FEATURES += "ssh-server-openssh"
    PACKAGE_CLASSES = "package_ipk"

    # Parallel builds — capped to avoid OOM on 14 GB RAM systems.
    # Full cpu_count() with 16 cores causes system crashes during GCC builds.
    BB_NUMBER_THREADS = "4"
    PARALLEL_MAKE     = "-j 2"

    # Shared caches — one level above build dir, shared across all targets
    DL_DIR    ?= "${TOPDIR}/../downloads"
    SSTATE_DIR ?= "${TOPDIR}/../sstate-cache"
