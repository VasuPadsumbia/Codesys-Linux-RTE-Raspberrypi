# KAS configuration — Raspberry Pi 5 64-bit with Xenomai Cobalt hard-RT
# Target: RPi5 2GB (BCM2712 / Cortex-A76 @ 2.4 GHz, force_turbo — no arm_boost)
#
# Build:  ./cclrte.sh build xenomai-rpi5
#         kas build kas/rpi5-xenomai.yml
#
# PREREQUISITES (must be satisfied before build):
#   Dovetail-patched kernel 6.6 source patches for BCM2712/arm64:
#   Obtain from https://source.denx.de/Xenomai/linux-dovetail (v6.6.y/dovetail branch)
#   Place .patch files in:
#     layers/meta-cclrte/recipes-kernel/linux-xenomai/files/patches/
#   Then uncomment SRC_URI patch lines in linux-raspberrypi-xenomai_6.6.bb
#
# meta-xenomai (xenomai-native userspace libs) must be added manually once
# a scarthgap-compatible layer is available or created in layers/meta-xenomai.
header:
  version: 14
  includes:
    - kas/base.yml

machine: rpi5-cclrte-xenomai
target: cclrte-xenomai-image

repos:
  meta-raspberrypi:
    url: git@github.com:agherzan/meta-raspberrypi
    branch: scarthgap
    layers:
      .:

  meta-realtime:
    url: https://git.yoctoproject.org/meta-realtime
    branch: scarthgap
    layers:
      .:

local_conf_header:
  rpi5-xenomai: |
    PREFERRED_PROVIDER_virtual/kernel = "linux-raspberrypi"

    ENABLE_UART    = "1"
    GPU_MEM        = "16"
    ENABLE_SPI_BUS = "1"
    ENABLE_I2C     = "1"

    # Accept Synaptics Wi-Fi firmware license (CYW43455 on RPi5)
    LICENSE_FLAGS_ACCEPTED += "synaptics-killswitch"

    # Disable VC4 KMS DRM driver — no display needed for a headless PLC.
    # Prevents meta-raspberrypi from appending dtoverlay=vc4-kms-v3d to config.txt,
    # which would keep the GPU clock trees and HDMI PLLs active.
    DISABLE_VC4GRAPHICS = "1"

    # Boot directly via RP1/VideoCore firmware (no U-Boot)
    RPI_USE_U_BOOT = "0"

    # wifi + rtc only — bluetooth not needed for a headless PLC.
    # Removing bluetooth eliminates bluetoothd + ofono from the image.
    MACHINE_FEATURES:append = " wifi rtc"

    # RPi5 (BCM2712) firmware tuning — Xenomai variant
    # arm_boost=1      : 3.0 GHz boost (stable on RPi5, no over_voltage needed)
    # force_turbo=1    : lock at max freq — eliminates DVFS latency spikes
    # disable_splash=1 : faster boot
    # dtoverlay=disable-bt : free primary UART for RS-485/Modbus
    # dtparam=watchdog=on  : enable BCM2712 hardware watchdog
    # arm_boost=1 (3.0 GHz) intentionally removed — 2.4 GHz is adequate for all PLC
    # scan cycles and reduces junction temperature by ~10–15 °C.
    # over_voltage, arm_freq, arm_freq_min are RPi4/BCM2711 params — NOT used on RPi5.
    RPI_EXTRA_CONFIG = "force_turbo=1\ntemp_limit=80\ngpu_mem=16\nhdmi_blanking=2\ndisplay_auto_detect=0\ncamera_auto_detect=0\ndtparam=audio=off\ndisable_splash=1\ndtoverlay=disable-bt\ndtparam=watchdog=on\n"
