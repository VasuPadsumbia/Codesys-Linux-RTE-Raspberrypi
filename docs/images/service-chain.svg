<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="'Segoe UI', system-ui, Arial, sans-serif">

  <!-- Background -->
  <rect width="760" height="420" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">systemd Service Dependency Chain — CCLRTE</text>
  <line x1="40" y1="36" x2="720" y2="36" stroke="#e2e8f0" stroke-width="1"/>

  <!-- =========================================================
       Left chain: RT boot path
       ========================================================= -->

  <!-- local-fs.target  x=30..180  y=48..72 -->
  <rect x="30" y="48" width="160" height="24" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="110" y="64" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8">local-fs.target</text>

  <!-- line down -->
  <line x1="110" y1="72" x2="110" y2="86" stroke="#475569" stroke-width="1.5"/>
  <line x1="110" y1="86" x2="110" y2="86" stroke="#475569" stroke-width="1"/>

  <!-- sysinit.target  x=30..180  y=88..112 -->
  <rect x="30" y="88" width="160" height="24" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="110" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8">sysinit.target</text>

  <!-- fork from sysinit.target to multiple branches -->
  <line x1="110" y1="112" x2="110" y2="130" stroke="#475569" stroke-width="1.5"/>

  <!-- rt-setup.service  x=30..240  y=132..165 -->
  <rect x="30" y="132" width="210" height="33" rx="6" fill="#065f46" stroke="#10b981" stroke-width="1.5"/>
  <text x="135" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#d1fae5">rt-setup.service</text>
  <text x="135" y="161" text-anchor="middle" font-size="8" fill="#6ee7b7">Type=oneshot · IRQ affinity · sched_rt=-1</text>

  <line x1="135" y1="165" x2="135" y2="182" stroke="#10b981" stroke-width="1.5"/>

  <!-- xenomai-setup.service (xenomai path)  x=30..240  y=184..215 -->
  <rect x="30" y="184" width="210" height="30" rx="6" fill="#0f3460" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="135" y="199" text-anchor="middle" font-size="9" font-weight="700" fill="#93c5fd">xenomai-setup.service</text>
  <text x="135" y="211" text-anchor="middle" font-size="8" fill="#60a5fa">[xenomai only] Cobalt verify · MAC detect</text>

  <line x1="135" y1="214" x2="135" y2="232" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- ethercat.service  x=30..240  y=234..270 -->
  <rect x="30" y="234" width="210" height="36" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="135" y="251" text-anchor="middle" font-size="9" font-weight="700" fill="#d1fae5">ethercat.service</text>
  <text x="135" y="263" text-anchor="middle" font-size="8" fill="#6ee7b7">CPUAffinity=2 · SCHED_FIFO 89</text>

  <line x1="135" y1="270" x2="135" y2="288" stroke="#10b981" stroke-width="2"/>

  <!-- codesyscontrol.service  x=30..240  y=290..335 -->
  <rect x="30" y="290" width="210" height="45" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="135" y="308" text-anchor="middle" font-size="9" font-weight="700" fill="#d1fae5">codesyscontrol.service</text>
  <text x="135" y="321" text-anchor="middle" font-size="8" fill="#6ee7b7">CPUAffinity=3 · SCHED_FIFO 80</text>
  <text x="135" y="333" text-anchor="middle" font-size="8" fill="#6ee7b7">rt-override.conf · mlockall · 500 &#956;s</text>

  <!-- codesys-firstboot  x=30..240  y=345..372 -->
  <rect x="30" y="349" width="210" height="28" rx="6" fill="#1f2937" stroke="#4b5563" stroke-width="1.5"/>
  <text x="135" y="363" text-anchor="middle" font-size="8.5" font-weight="700" fill="#9ca3af">codesys-firstboot.service</text>
  <text x="135" y="374" text-anchor="middle" font-size="8" fill="#6b7280">ConditionPathExists=! stamp · one-shot install</text>

  <!-- =========================================================
       Right column: other services
       ========================================================= -->

  <!-- systemd-networkd.service  x=310..530  y=132..162 -->
  <rect x="310" y="132" width="220" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="420" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#f1f5f9">systemd-networkd.service</text>
  <text x="420" y="162" text-anchor="middle" font-size="8" fill="#94a3b8">eth0 static · wlan0 DHCP · network-firstboot</text>

  <!-- fan-control.service  x=310..530  y=174..198 -->
  <rect x="310" y="174" width="220" height="24" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="420" y="189" text-anchor="middle" font-size="9" font-weight="700" fill="#f1f5f9">fan-control.service</text>
  <text x="420" y="198" text-anchor="middle" font-size="8" fill="#94a3b8">PWM fan · 50–60 &#176;C band · CPU2,3 aware</text>

  <!-- mosquitto.service  x=310..530  y=210..234 -->
  <rect x="310" y="210" width="220" height="24" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="420" y="225" text-anchor="middle" font-size="9" font-weight="700" fill="#f1f5f9">mosquitto.service</text>
  <text x="420" y="234" text-anchor="middle" font-size="8" fill="#94a3b8">MQTT :1883 / WebSocket :9001</text>

  <!-- plc-webui.service  x=310..530  y=246..272 -->
  <rect x="310" y="246" width="220" height="26" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="420" y="261" text-anchor="middle" font-size="9" font-weight="700" fill="#f1f5f9">plc-webui.service</text>
  <text x="420" y="272" text-anchor="middle" font-size="8" fill="#94a3b8">Flask :8080 · CPUAffinity=0,1 · Nice=10</text>

  <!-- rt-verify.service  x=310..530  y=284..310 -->
  <rect x="310" y="284" width="220" height="26" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="420" y="299" text-anchor="middle" font-size="9" font-weight="700" fill="#f1f5f9">rt-verify.service</text>
  <text x="420" y="310" text-anchor="middle" font-size="8" fill="#94a3b8">cyclictest 2-phase · PASS 11 &#956;s · WebUI trigger</text>

  <!-- watchdog.service  x=310..530  y=322..348 -->
  <rect x="310" y="322" width="220" height="26" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="420" y="337" text-anchor="middle" font-size="9" font-weight="700" fill="#f1f5f9">watchdog.service</text>
  <text x="420" y="348" text-anchor="middle" font-size="8" fill="#94a3b8">BCM2712 HW watchdog · 10 s SW / 15 s HW</text>

  <!-- protocol-manager (note box)  x=560..730  y=234..292 -->
  <rect x="560" y="234" width="178" height="58" rx="6" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="649" y="252" text-anchor="middle" font-size="9" font-weight="700" fill="#ddd6fe">protocol-manager.sh</text>
  <text x="649" y="265" text-anchor="middle" font-size="8" fill="#c4b5fd">eth1 mutual exclusivity:</text>
  <text x="649" y="278" text-anchor="middle" font-size="8" fill="#c4b5fd">EtherCAT / PROFINET / Modbus-TCP</text>
  <text x="649" y="291" text-anchor="middle" font-size="8" fill="#c4b5fd">(only one active at a time)</text>

  <!-- =========================================================
       Branch lines from sysinit.target to right column services
       ========================================================= -->
  <!-- horizontal branch from sysinit x=110 to right column at x=308 via y=120 -->
  <line x1="110" y1="112" x2="110" y2="120" stroke="#475569" stroke-width="1"/>
  <line x1="110" y1="120" x2="308" y2="120" stroke="#475569" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- vertical drops to each right service -->
  <line x1="308" y1="120" x2="308" y2="147" stroke="#475569" stroke-width="1"/>
  <line x1="308" y1="147" x2="310" y2="147" stroke="#475569" stroke-width="1"/>

  <line x1="340" y1="120" x2="340" y2="174" stroke="#475569" stroke-width="1"/>
  <line x1="340" y1="174" x2="342" y2="174" stroke="#475569" stroke-width="1"/>

  <line x1="370" y1="120" x2="370" y2="210" stroke="#475569" stroke-width="1"/>
  <line x1="370" y1="210" x2="372" y2="210" stroke="#475569" stroke-width="1"/>

  <line x1="400" y1="120" x2="400" y2="246" stroke="#475569" stroke-width="1"/>
  <line x1="400" y1="246" x2="402" y2="246" stroke="#475569" stroke-width="1"/>

  <line x1="430" y1="120" x2="430" y2="284" stroke="#475569" stroke-width="1"/>
  <line x1="430" y1="284" x2="432" y2="284" stroke="#475569" stroke-width="1"/>

  <line x1="460" y1="120" x2="460" y2="322" stroke="#475569" stroke-width="1"/>
  <line x1="460" y1="322" x2="462" y2="322" stroke="#475569" stroke-width="1"/>

  <!-- Protocol manager line from ethercat -->
  <line x1="240" y1="252" x2="560" y2="262" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Footnotes -->
  <text x="30" y="394" font-size="8" fill="#64748b">Dashed box = xenomai build only   &#183;   Dashed lines = non-blocking dependency / informational</text>
  <text x="30" y="407" font-size="8" fill="#64748b">rt-setup.service runs first as Type=oneshot: moves IRQs to CPU0,1 · pins NIC IRQ to CPU2 · sets SCHED_FIFO priorities after process start</text>

</svg>
