  <text x="610" y="196" text-anchor="middle" font-size="8.5" fill="#94a3b8">:8080 · dark industrial</text>
  <text x="610" y="208" text-anchor="middle" font-size="8.5" fill="#94a3b8">5 pages · PBKDF2 auth</text>

