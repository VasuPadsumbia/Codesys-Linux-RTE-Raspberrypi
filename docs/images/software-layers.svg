  <text x="136" y="196" text-anchor="middle" font-size="8.5" fill="#94a3b8">3.5.21.41 · CPU3 · FIFO 80</text>
  <text x="136" y="208" text-anchor="middle" font-size="8.5" fill="#94a3b8">500 &#956;s cycle · mlockall</text>

  <rect x="220" y="160" width="148" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
