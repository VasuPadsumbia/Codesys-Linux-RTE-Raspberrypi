  <text x="294" y="196" text-anchor="middle" font-size="8.5" fill="#94a3b8">v1.6.9 · ec_master.ko</text>
  <text x="294" y="208" text-anchor="middle" font-size="8.5" fill="#94a3b8">ec_generic.ko · CPU2 FIFO 90</text>

  <rect x="378" y="160" width="148" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
