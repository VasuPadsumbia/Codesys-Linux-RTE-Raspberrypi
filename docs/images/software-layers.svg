  <rect x="62" y="274" width="622" height="34" rx="6" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="373" y="291" text-anchor="middle" font-size="10" font-weight="700" fill="#f3f4f6">PREEMPT_RT (rpi5-cclrte) / Xenomai Cobalt (rpi5-cclrte-xenomai)  ·  kernel 6.6.63  ·  HZ=1000</text>
  <text x="373" y="305" text-anchor="middle" font-size="8.5" fill="#6b7280">linux-raspberrypi + kernel config fragments  ·  CONFIG_DOVETAIL=y  ·  isolcpus=2,3  ·  bcm2712_defconfig</text>

  <!-- meta-cclrte layer -->
  <rect x="62" y="320" width="622" height="22" rx="5" fill="#0c1a2e" stroke="#1e40af" stroke-width="1.5"/>
  <text x="373" y="335" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa">meta-cclrte Yocto layer  ·  Scarthgap LAYERSERIES_COMPAT  ·  KAS 5.3  ·  kas/base.yml + kas/rpi5-xenomai.yml</text>

  <!-- Arrow from image block to KAS block -->
  <line x1="360" y1="350" x2="360" y2="368" stroke="#6b7280" stroke-width="1.5" marker-end="url(#adown)"/>

  <!-- =========================================================
       KAS Build System   y=370..410
       ========================================================= -->
  <rect x="48" y="370" width="624" height="40" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="360" y="389" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">KAS Build System  (kas 5.3 · kas build kas/rpi5-xenomai.yml)</text>
  <text x="360" y="404" text-anchor="middle" font-size="9"  fill="#92400e">poky (scarthgap)  &#183;  meta-openembedded  &#183;  meta-raspberrypi  &#183;  meta-realtime  &#183;  BB_NUMBER_PARSE_THREADS=4  &#183;  INHERIT:remove=create-spdx</text>

  <!-- Arrow from KAS to SD image -->
  <line x1="360" y1="410" x2="360" y2="428" stroke="#6b7280" stroke-width="1.5" marker-end="url(#adown)"/>

  <!-- =========================================================
       Output   y=430..460
       ========================================================= -->
  <rect x="200" y="430" width="320" height="30" rx="6" fill="#022c22" stroke="#10b981" stroke-width="1.5"/>
  <text x="360" y="450" text-anchor="middle" font-size="10" font-weight="700" fill="#34d399">cclrte-xenomai-image-rpi5-cclrte-xenomai.rpi-sdimg  &#8594;  dd to SD card</text>

