  <line x1="40" y1="36" x2="680" y2="36" stroke="#e2e8f0" stroke-width="1"/>

  <!-- =========================================================
       Top: CODESYS IDE (PC)   y=48..88
       ========================================================= -->
  <rect x="200" y="48" width="320" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">CODESYS Development System (PC)</text>
  <text x="360" y="81" text-anchor="middle" font-size="9"  fill="#1e40af">Scan Network &#8594; Login &#8594; Download IEC 61131-3 project</text>

  <!-- Arrow down -->
  <line x1="360" y1="88" x2="360" y2="106" stroke="#6b7280" stroke-width="1.5" marker-end="url(#adown)"/>
  <text x="400" y="100" font-size="8" fill="#6b7280">TCP 1217 (gateway)</text>

  <!-- =========================================================
       cclrte Yocto Image   y=108..350
       ========================================================= -->
  <rect x="48" y="108" width="624" height="242" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="360" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">cclrte Yocto Image  (Scarthgap · IPK · aarch64)</text>
  <text x="360" y="143" text-anchor="middle" font-size="9" fill="#475569">MACHINE=rpi5-cclrte-xenomai  ·  DISTRO=cclrte  ·  BB_VERSION 2.8.1  ·  5214 tasks</text>

  <line x1="58" y1="152" x2="662" y2="152" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Component boxes row 1 -->
