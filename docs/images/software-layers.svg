  <text x="373" y="255" text-anchor="middle" font-size="8.5" fill="#9ca3af">rt-setup &#8594; ethercat &#8594; codesyscontrol   &#183;   codesys-firstboot &#183; plc-webui &#183; mosquitto &#183; systemd-networkd &#183; fan-control &#183; rt-verify</text>

