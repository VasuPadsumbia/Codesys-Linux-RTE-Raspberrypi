name: Build QEMU Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-qemu:
    name: Build cclrte-image-qemu
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Yocto build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git wget curl file \
            gcc g++ make diffstat texinfo chrpath socat \
            libsdl1.2-dev xterm cpio lz4 zstd \
            python3 python3-pip python3-venv \
            gawk unzip locales \
            libssl-dev libelf-dev

      - name: Set locale
        run: |
          sudo locale-gen en_US.UTF-8
          echo "LANG=en_US.UTF-8" >> $GITHUB_ENV

      - name: Set up Python virtual environment and install KAS
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          kas --version

      - name: Restore sstate-cache
        uses: actions/cache@v4
        with:
          path: sstate-cache
          key: sstate-qemu-${{ hashFiles('kas/qemu-x86-64.yml', 'kas/base.yml') }}-${{ github.ref_name }}
          restore-keys: |
            sstate-qemu-${{ hashFiles('kas/qemu-x86-64.yml', 'kas/base.yml') }}-
            sstate-qemu-

      - name: Restore downloads cache
        uses: actions/cache@v4
        with:
          path: downloads
          key: downloads-${{ hashFiles('kas/base.yml') }}-${{ github.ref_name }}
          restore-keys: |
            downloads-${{ hashFiles('kas/base.yml') }}-
            downloads-

      - name: Build QEMU image
        env:
          LANG: en_US.UTF-8
        run: |
          source venv/bin/activate
          # DL_DIR and SSTATE_DIR are set relative to TOPDIR in base.yml (../downloads, ../sstate-cache)
          # With the repo as cwd, build/ is the TOPDIR, so caches land at ./downloads and ./sstate-cache
          kas build kas/qemu-x86-64.yml

      - name: Upload QEMU image artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cclrte-image-qemu-${{ github.sha }}
          path: |
            build/tmp/deploy/images/qemux86-64/cclrte-image-qemu-qemux86-64*.wic*
            build/tmp/deploy/images/qemux86-64/cclrte-image-qemu-qemux86-64*.ext4*
          retention-days: 7

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log-${{ github.sha }}
          path: |
            build/tmp/log/
            build/tmp/work/**/temp/log.*
          retention-days: 3
