# BCM2711 Hardware Watchdog Configuration
# Watchdog daemon pings /dev/watchdog every 2 seconds.
# If CODESYS hangs and the daemon stops, the hardware reboots the system
# after 10 seconds — less than the BCM2711's 15-second hardware timeout.

watchdog-device    = /dev/watchdog
watchdog-timeout   = 10
interval           = 2

admin = root
log-dir = /var/log

# System health checks
max-load-1  = 24
max-load-5  = 18
max-load-15 = 12
min-memory  = 1

# Try to restart CODESYS before issuing a hard reboot
repair-binary = /usr/sbin/cclrte-watchdog-repair.sh
