# CCLRTE Real-time sysctl tuning
# Applied by systemd-sysctl at boot (before rt-setup.service)

# Remove RT bandwidth throttle — CODESYS + hardware watchdog replace this safety net
kernel.sched_rt_runtime_us = -1
kernel.sched_rt_period_us  = 1000000

# Never swap — page faults during a CODESYS scan cycle cause deadline misses
vm.swappiness = 0

# Limit dirty page writeback to short bursts
vm.dirty_ratio            = 10
vm.dirty_background_ratio = 5

# Keep free memory available to avoid reclaim latency
vm.min_free_kbytes = 65536

# Disable hung-task detector — RT tasks held in SCHED_FIFO trigger false positives
kernel.hung_task_timeout_secs = 0

# Disable software NMI watchdog — causes measurable latency on loaded RT cores
kernel.nmi_watchdog = 0
kernel.watchdog     = 0

# Reduce network stack latency for OPC-UA and MQTT on CPU0,1
net.core.busy_poll = 50
net.core.busy_read = 50

# File descriptor and PID limits for CODESYS + industrial protocol stack
kernel.pid_max = 65536
fs.file-max    = 100000
