# PROFINET RT Configuration (device/slave role)
# For PROFINET controller (master), use CODESYS PROFINET SL add-on

[device]
# Station name — must match the GSD file and PROFINET controller config
station_name  = cclrte-plc
vendor_id     = 0x0001
device_id     = 0x0001

[network]
# PROFINET runs on eth1 (separate from CODESYS programming port eth0)
interface        = eth1
enable_dcp       = true
# RT Class 2 cycle time (microseconds)
rt_cycle_time_us = 1000

[slots]
# Slot 0: Device Access Point (always present per PROFINET spec)
slot0_module = DAP
