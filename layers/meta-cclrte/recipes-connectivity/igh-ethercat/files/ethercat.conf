# IgH EtherCAT Master Configuration
# CCLRTE: EtherCAT master pinned to CPU2 (SCHED_FIFO 90) by rt-setup.sh

# MAC address of the NIC dedicated to EtherCAT.
# IMPORTANT: Do NOT use eth0 (reserved for CODESYS programming port).
# Options:
#   eth1    — USB-to-Ethernet adapter for EtherCAT fieldbus
#   eth1    — Additional NIC via USB3 port (e.g. USB Gigabit adapter)
#   HAT NIC — Industrial EtherCAT HAT (e.g. EK1100 via SPI)
#
# Set to the MAC address of your EtherCAT NIC:
#   ip link show eth1
#   MASTER0_DEVICE="aa:bb:cc:dd:ee:ff"
MASTER0_DEVICE=""

# Use the generic Ethernet driver (works with any Linux NIC).
# For Intel NICs (better RT performance): DEVICE_MODULES="e1000e"
DEVICE_MODULES="generic"
