# IgH EtherCAT Master Configuration
# CCLRTE: EtherCAT master pinned to CPU2 (SCHED_FIFO 90) by rt-setup.sh
#
# Hardware: Waveshare PCIe TO Gigabit ETH Board (C) — RTL8111H, PCIe x1 Gen2
#   Connects via RPi5 HAT+ FPC PCIe connector → appears as eth1 (net.ifnames=0)
#   PCIe enabled in firmware: dtparam=pciex1=on + dtparam=pciex1_gen=2

# MAC address of the EtherCAT NIC (eth1 = Waveshare RTL8111H PCIe board).
# Auto-populated by xenomai-setup.sh at first boot from eth1 MAC.
# Override manually: ip link show eth1  →  copy MAC here.
MASTER0_DEVICE=""

# generic: AF_PACKET over kernel r8169 — works with kernel 6.6.
# IgH native r8169 driver requires kernel < 6.6; ec_generic is the correct choice here.
DEVICE_MODULES="generic"
