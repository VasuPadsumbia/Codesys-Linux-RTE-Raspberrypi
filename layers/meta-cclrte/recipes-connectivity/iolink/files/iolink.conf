# IO-Link Master Configuration
# CCLRTE: IO-Link master runs over SPI0 (GPIO 8-11) via IO-Link HAT

[master]
transport    = spi
spi_device   = /dev/spidev0.0
spi_speed_hz = 4000000
num_ports    = 4
# Minimum cycle time per IO-Link spec: 400 µs (COM3 = 230.4 kbps)
min_cycle_time_us = 400

[port1]
enabled = true
# AUTOCOM: auto-detect COM1 (4.8 kbps), COM2 (38.4 kbps), COM3 (230.4 kbps)
mode = AUTOCOM

[port2]
enabled = true
mode = AUTOCOM

[port3]
enabled = false
mode = AUTOCOM

[port4]
enabled = false
mode = AUTOCOM
