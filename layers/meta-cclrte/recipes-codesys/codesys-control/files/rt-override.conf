# CCLRTE RT override for codesyscontrol.service
# Drop-in: /etc/systemd/system/codesyscontrol.service.d/rt-override.conf
#
# This file persists even if the CODESYS IDE reinstalls and overwrites the base
# service file. Systemd always merges drop-ins on top of the base unit.
#
# Result: CODESYS runtime always runs on CPU3 with SCHED_FIFO 80 regardless
# of what the IDE installer puts in codesyscontrol.service.

[Service]
CPUSchedulingPolicy=fifo
CPUSchedulingPriority=80
CPUAffinity=3
LimitMEMLOCK=infinity
LimitNOFILE=65536
LimitSTACK=8388608
# WatchdogSec intentionally omitted — codesyscontrol.bin does not implement
# the systemd sd_notify watchdog protocol. Hardware watchdog (BCM2712) handles
# system-level hang recovery via watchdog.service.
