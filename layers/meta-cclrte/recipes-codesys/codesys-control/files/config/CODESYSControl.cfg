;linuxarm64
; CODESYS Control for Linux SL — Runtime Configuration
; CCLRTE / Raspberry Pi 5 (BCM2712) — PREEMPT_RT, isolcpus=2,3, force_turbo=1
; Author: Vasu Padsumbia
;
; IMPORTANT: The [CmpSettings] FileReference chain is critical for login to work.
;   FileReference.0 → SysFileMap.cfg (component file mappings — generated by runtime)
;   FileReference.1 → CODESYSControl_User.cfg (our RT/gateway/UserMgmt overrides)
;
; SchedulerInterval=500 must match your CODESYS task cycle time (µs).
; Logger writes to /run/codesys/ (tmpfs) — RAM logging, zero SD card writes, no RT impact.

[SysFile]
FilePath.1=/etc/codesyscontrol/, 3S.dat
PlcLogicPrefix=1

[SysTarget]
TargetVersionMask=0
TargetVersionCompatibilityMask=0xFFFF0000

[CmpSocketCanDrv]
ScriptPath=/opt/codesys/scripts/
ScriptName=rts_set_baud.sh
AsyncSend=1

[CmpSettings]
IsWriteProtected=1
FileReference.0=SysFileMap.cfg, SysFileMap
FileReference.1=/etc/codesyscontrol/CODESYSControl_User.cfg

[SysExcept]
Linux.DisableFpuOverflowException=1
Linux.DisableFpuUnderflowException=1
Linux.DisableFpuInvalidOperationException=1

[CmpLog]
Logger.0.Name=codesyscontrol.log
; Log file is symlinked to /run/codesys/ (tmpfs) by codesys-setup.sh on each boot.
; This avoids SD card writes from CPU3 without disabling logging entirely.
Logger.0.Enable=1
Logger.0.MaxEntries=1000
Logger.0.MaxFileSize=1000000
Logger.0.MaxFiles=2
Logger.0.Backend.0.ClassId=0x00000104

[SysEthernet]
; ProtocolFilter=3 allows only relevant frames through the CODESYS network stack
Linux.ProtocolFilter=3

[CmpSchedule]
; SchedulerInterval must match your CODESYS task cycle time in µs.
; 500 = 500 µs minimum cycle (PREEMPT_RT); use 250 for Xenomai.
SchedulerInterval=500
ProcessorLoad.Enable=1
ProcessorLoad.Maximum=95
ProcessorLoad.Interval=5000
; Prevent watchdog from firing when a cycle is missed (normal under load)
DisableOmittedCycleWatchdog=1

[SysCpuHandling]
; Disable DMA latency requests — prevents CPU from entering C-states during RT operation
Linux.DisableCpuDmaLatency=1

[CmpOPCUAServer]
; Disabled by default — OPC UA housekeeping threads can cause priority inversions on CPU3.
; Enable when needed: set Enable=1 and restart codesyscontrol.
Enable=0

[SysSocket]
; Disable IPv6 — reduces network stack overhead on embedded target
Linux.IPv6=0

[ComponentManager]
; CmpRetain must be in the PRIMARY config — FileReference (User.cfg) is not scanned
; for [ComponentManager] entries. libCmpRetain.so provides the RetainUpdate symbol
; required by CmpApp; missing this causes safe mode on every boot.
Component.0=CmpRetain
