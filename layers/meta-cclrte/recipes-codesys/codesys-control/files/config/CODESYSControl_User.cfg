;linuxarm64
; CODESYS Control — User/RT overrides loaded via CmpSettings FileReference
; Author: Vasu Padsumbia
;
; This file is read after the main CODESYSControl.cfg.
; The CODESYS IDE wizard does NOT overwrite this file, so RT and gateway
; settings here survive IDE-triggered runtime reinstalls.
;
; IMPORTANT: Section name is [CmpUserMgmt] (NOT [CmpUserMgr]) for CODESYS 3.5.x+.
; Using the wrong section name causes all IDE logins to be rejected silently.

[CmpGateway]
; Embedded gateway — IDE connects on port 1217 without a separate process
ServerType=1

[SysProcess]
; CPU3 isolated by isolcpus=2,3, dedicated to CODESYS scan cycle.
; Bitmask 0x08 = CPU3 only (bit 3).
SysCPUAffinity=0x08
SchedPolicy=SCHED_FIFO
SchedPriority=80
MemLock=YES
StackSize=1048576

[CmpUserMgmt]
; Disable device user management — IDE connects without username/password.
; Set to 1 and configure users via CODESYS Security Screen for production.
UserMgmtEnabled=0

[CmpLog]
Logger.0.Filter=0x00000007

[ComponentManager]
; CmpRetain: required for retain variable persistence across power cycles.
; Loaded as a dynamic shared lib (libCmpRetain.so) — must be listed here
; because the .ipk post-install uses cfg_add_cmp.sh to register it and
; CODESYS does not auto-discover dynamic components from /opt/codesys/lib/.
Component.0=CmpRetain
