; CODESYS Control for Linux SL — Runtime Configuration
; CCLRTE: tuned for PREEMPT_RT motion control on Raspberry Pi 5 (BCM2712)
; Supported scan cycle: 500 µs minimum (PREEMPT_RT, isolcpus=2,3, force_turbo=1)
; Set task cycle in CODESYS IDE: Application > Task Configuration > Cyclic task interval

[SysProcess]
; Pin CODESYS tasks to CPU3 (isolated from OS, dedicated to scan cycle)
; Bitmask 0x08 = CPU3 only
SysCPUAffinity=0x08
; Real-time scheduling — SCHED_FIFO overrides POSIX default (SCHED_OTHER)
SchedPolicy=SCHED_FIFO
SchedPriority=80
; Lock all memory pages at startup to prevent page faults during scan cycle
; Page faults cause unpredictable latency spikes
MemLock=YES
; Main stack size (bytes)
StackSize=1048576

[SysEthernet]
; eth0 is the dedicated CODESYS programming and runtime port
; IP: 192.168.2.100 (static, configured by cclrte-network)
; Connect the CODESYS IDE to this address on port 1217
Adapter.0.Name=eth0

[SysSocket]
; CODESYS Gateway — accepts IDE connections for program download and monitoring
HostName=0.0.0.0
Port=1217

[CmpGateway]
; 1 = enable remote programming gateway
ServerType=1

[SysFile]
; Boot project location — PLC program loaded at startup
BootprojectPath=/var/opt/codesys/PlcLogic/

[SysCom]
; RS-485 via UART0 (Bluetooth disabled by dtoverlay=disable-bt in config.txt)
Port.0.Name=/dev/ttyAMA0

[CmpEthercat]
; EtherCAT master type — IgH master loaded as kernel module
; Configured via /etc/ethercat.conf
MasterType=IghEthercat

[CmpOPCUA]
; Embedded OPC UA server — accessible from wlan0 management network
Port=4840
MaxConnections=10
SecurityMode=None

[CmpMqtt]
; MQTT client — connects to local Mosquitto broker
BrokerAddress=localhost
BrokerPort=1883

[SysLog]
LogPath=/var/log/codesys/
; WARNING level in production — change to INFO for debugging
LogLevel=WARNING
MaxLogFileSize=10485760
MaxLogFiles=5
