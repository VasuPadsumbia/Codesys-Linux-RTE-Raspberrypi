# CODESYS Control Linux RTE — Yocto distribution
require conf/distro/poky.conf

DISTRO        = "cclrte"
DISTRO_NAME   = "CODESYS Control Linux RTE"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "scarthgap"
MAINTAINER    = "cclrte"

DISTRO_FEATURES:append = " systemd wifi bluetooth ext2 pci usb preempt-rt"
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"

VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts  = "systemd-compat-units"
INIT_MANAGER = "systemd"

# GNU libstdc++ required by CODESYS runtime shared libraries
TC_CXX_RUNTIME = "gnu"

SDKIMAGE_FEATURES = "dev-pkgs dbg-pkgs src-pkgs"
IMAGE_LINGUAS = "en-us"

# rt-setup applies CPU affinity and sysctl tuning before CODESYS starts
DISTRO_EXTRA_RDEPENDS += "rt-setup"
