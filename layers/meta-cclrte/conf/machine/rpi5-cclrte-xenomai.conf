#@TYPE: Machine
#@NAME: Raspberry Pi 5 — CODESYS Control Linux RTE (Xenomai Cobalt)
#@DESCRIPTION: RPi5 2GB (BCM2712 / Cortex-A76) with Xenomai Cobalt dual-kernel.
#   Worst-case latency target: 5-20 µs (BCM2712 is newer; characterise with cyclictest).
#   Use when PREEMPT_RT worst-case > 100 µs or cycle time < 500 µs needed.
#
#   PREREQUISITE: Dovetail patches for kernel 6.6 + BCM2712 must be placed in
#   recipes-kernel/linux/files/patches/ before building.
#   Upstream source: https://source.denx.de/Xenomai/linux-dovetail
#   Target branch: v6.6.y/dovetail (verify against Xenomai 3.3+ release notes)
#
#   CPU2 → EtherCAT master (Cobalt domain, SCHED_FIFO 90)  [isolated]
#   CPU3 → CODESYS scan cycle (Cobalt domain, SCHED_FIFO 80) [isolated]
#   CPU0,1 → Linux OS, WebUI, SSH, MQTT, OPC-UA

require conf/machine/rpi5-cclrte.conf

PREFERRED_PROVIDER_virtual/kernel = "linux-raspberrypi"

# Remove PREEMPT_RT-specific cmdline params that conflict with Cobalt
CMDLINE:remove = "preempt=full"

# xenomai.supported_cpus=0xC : bitmask 0xC = CPUs 2 and 3 (Cobalt domain)
# NOTE: xenomai.smi=disabled is x86-only (SMI does not exist on ARM) — NOT used here
CMDLINE:append = " xenomai.supported_cpus=0xC isolcpus=2,3 nohz_full=2,3"

IMAGE_FSTYPES = "rpi-sdimg wic.bz2"
