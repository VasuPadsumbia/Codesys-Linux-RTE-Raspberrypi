#@TYPE: Machine
#@NAME: Raspberry Pi 5 — CODESYS Control Linux RTE (PREEMPT_RT)
#@DESCRIPTION: RPi5 64-bit (BCM2712 / Cortex-A76) tuned for PREEMPT_RT motion control.
#   2 GB RAM variant — build threads capped conservatively.
#   CPU2 → EtherCAT master (SCHED_FIFO 90)  [isolated]
#   CPU3 → CODESYS scan cycle (SCHED_FIFO 80) [isolated]
#   CPU0,1 → Linux OS, WebUI, SSH, MQTT, OPC-UA

require conf/machine/raspberrypi5.conf

PREFERRED_PROVIDER_virtual/kernel = "linux-raspberrypi"
# Map to bcm2712_defconfig — linux-raspberrypi.inc keys KBUILD_DEFCONFIG
# by exact machine name; our custom name doesn't match 'raspberrypi5'
KBUILD_DEFCONFIG = "bcm2712_defconfig"
LINUX_VERSION_EXTENSION = "-cclrte-rt"
MACHINE_EXTRA_RRECOMMENDS += "kernel-modules"
MACHINE_FEATURES:append = " rtc"

# isolcpus=2,3     : reserve CPUs 2,3 exclusively for RT tasks
# nohz_full=2,3    : tickless on isolated CPUs
# rcu_nocbs=2,3    : RCU callbacks off isolated CPUs
# threadirqs       : all IRQ handlers into preemptable kernel threads
# preempt=full     : full kernel preemption
# nosoftlockup     : suppress false-positive warnings on loaded RT cores
# net.ifnames=0    : disable predictable interface names (forces eth0 on RPi5 instead of end0)
CMDLINE:append = " isolcpus=2,3 nohz_full=2,3 rcu_nocbs=2,3 threadirqs preempt=full nosoftlockup net.ifnames=0"

GPU_MEM        = "16"
ENABLE_UART    = "1"
ENABLE_SPI_BUS = "1"
ENABLE_I2C     = "1"

# RPi5 (BCM2712) firmware tuning notes:
#   arm_boost=1          : boost to 3.0 GHz — stable without over_voltage on RPi5
#   force_turbo=1        : lock at max freq, eliminates DVFS latency spikes
#   disable_splash=1     : faster boot
#   dtoverlay=disable-bt : free primary UART for RS-485/Modbus (UART0 = /dev/ttyAMA0)
#   dtparam=watchdog=on  : enable RP1/BCM2712 hardware watchdog
#   NOTE: over_voltage is NOT used on RPi5; arm_boost handles frequency stability
RPI_EXTRA_CONFIG = "arm_boost=1\nforce_turbo=1\ndisable_splash=1\ndtoverlay=disable-bt\ndtparam=watchdog=on\n"

IMAGE_FSTYPES = "rpi-sdimg wic.bz2"

# Ensure vfat boot partition label is 11 chars or less to prevent mkfs.vfat errors
BOOTDD_VOLUME_ID = "cclrt-boot"
