# BCM2712 (RPi5) Hardware Watchdog Configuration
# Watchdog daemon pings /dev/watchdog every 2 seconds.
# If CODESYS hangs and the daemon stops, the hardware reboots the system
# after 10 seconds — BCM2712 default hardware timeout is 15 seconds.

watchdog-device    = /dev/watchdog
watchdog-timeout   = 10
interval           = 2

admin = root
log-dir = /var/log

# System health checks
max-load-1  = 24
max-load-5  = 18
max-load-15 = 12
min-memory  = 1

# repair-binary intentionally omitted — no repair script present.
# The watchdog will hard-reboot on timeout without attempting a repair.
