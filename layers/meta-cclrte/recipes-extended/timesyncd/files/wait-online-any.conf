[Service]
# --any: succeed once at least one managed interface is online
# (eth0 static comes up almost immediately, so this fires early in boot)
# --timeout=60: give up after 60 s even if no interface is configured,
# so network-online.target still fires and chrony can start.
ExecStart=
ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any --timeout=60
