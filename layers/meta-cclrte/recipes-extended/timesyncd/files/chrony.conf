# CCLRTE PLC NTP servers — loaded from /etc/chrony/conf.d/
# The PLC clock must track NTP so CODESYS log timestamps and OPC-UA
# timestamps match the engineering PC and SCADA system.
#
# base chrony.conf already provides makestep, driftfile, rtcsync, logdir.

server time.cloudflare.com iburst
server time.google.com iburst
pool pool.ntp.org iburst
