# Disable features incompatible with Xenomai Cobalt / Dovetail

# PREEMPT_RT and Cobalt are mutually exclusive
CONFIG_PREEMPT_RT=n

# Lock debugging incompatible with Dovetail
CONFIG_LOCKDEP=n
CONFIG_PROVE_LOCKING=n
CONFIG_DEBUG_SPINLOCK=n
CONFIG_DEBUG_LOCK_ALLOC=n

# Tracing overhead — incompatible with hard RT
CONFIG_LATENCYTOP=n
CONFIG_FTRACE=n
CONFIG_FUNCTION_TRACER=n
CONFIG_IRQSOFF_TRACER=n
CONFIG_SCHED_DEBUG=n
CONFIG_DEBUG_PREEMPT=n

# CPU idle — must be disabled for deterministic Cobalt scheduling
CONFIG_CPU_IDLE=n
CONFIG_ARM_CPUIDLE=n
