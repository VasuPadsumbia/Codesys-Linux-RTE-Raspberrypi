# Xenomai Cobalt (Dovetail) kernel configuration fragment
# Enables the Dovetail interrupt pipeline required by Xenomai 3.2+

# Dovetail interrupt pipeline — foundation of Xenomai Cobalt on mainline kernels
CONFIG_DOVETAIL=y
CONFIG_IRQ_PIPELINE=y

# Cobalt co-kernel
CONFIG_XENOMAI=y
CONFIG_XENO_COBALT=y

# Networking support in RT domain (for EtherCAT raw socket)
CONFIG_XENO_DRIVERS_NET=y

# High-res timers required by Cobalt
CONFIG_HIGH_RES_TIMERS=y
CONFIG_HZ_1000=y
CONFIG_HZ=1000

# Linux-side preemption — voluntary is sufficient; Cobalt handles hard RT
CONFIG_PREEMPT_VOLUNTARY=y

# Tickless for Cobalt CPUs
CONFIG_NO_HZ_FULL=y
