# CCLRTE Kernel Config Fragment — disable debug/trace overhead
# Kernel tracing and debug options add measurable jitter to RT tasks.
# These are disabled in production RT builds.

CONFIG_DEBUG_PREEMPT=n
CONFIG_LATENCYTOP=n
CONFIG_SCHED_DEBUG=n
CONFIG_DEBUG_TIMEKEEPING=n

# Disable tracing infrastructure (significant overhead)
CONFIG_FTRACE=n
CONFIG_FUNCTION_TRACER=n
CONFIG_FUNCTION_GRAPH_TRACER=n
CONFIG_IRQSOFF_TRACER=n
CONFIG_PREEMPT_TRACER=n
CONFIG_SCHED_TRACER=n
CONFIG_NOP_TRACER=n
CONFIG_TRACING=n
CONFIG_GENERIC_TRACER=n
CONFIG_DYNAMIC_FTRACE=n
CONFIG_RING_BUFFER=n

# Disable lock debugging (heavy overhead)
CONFIG_DEBUG_SPINLOCK=n
CONFIG_DEBUG_MUTEXES=n
CONFIG_DEBUG_LOCK_ALLOC=n
CONFIG_PROVE_LOCKING=n
CONFIG_LOCK_STAT=n
CONFIG_DEBUG_ATOMIC_SLEEP=n

# Disable kernel probes
CONFIG_KPROBES=n

# Keep perf events — needed by cyclictest and rt-verify
CONFIG_PERF_EVENTS=y

# Disable NMI watchdog — causes latency spikes
CONFIG_NMI_WATCHDOG=n
