# CCLRTE Kernel Config Fragment — PREEMPT_RT core
# Applied via linux-raspberrypi_%.bbappend
# Requires: 0001-arm64-select-ARCH_SUPPORTS_RT.patch (applied first via SRC_URI)

CONFIG_PREEMPT_RT=y

# Allow reading kernel config at runtime via /proc/config.gz
CONFIG_IKCONFIG=y
CONFIG_IKCONFIG_PROC=y

# /dev/cpu_dma_latency — lets cyclictest and CODESYS block CPU C-state transitions
# to prevent latency spikes from deep sleep exit latency
CONFIG_CPU_DMA_LATENCY=y

# 1000 Hz timer — 1 ms resolution, required for sub-ms cycle times
CONFIG_HZ_1000=y
CONFIG_HZ=1000
CONFIG_HIGH_RES_TIMERS=y

# Tickless operation on isolated CPUs (pairs with nohz_full= cmdline)
CONFIG_NO_HZ_FULL=y
CONFIG_NO_HZ=y
CONFIG_NO_HZ_IDLE=n
CONFIG_HZ_PERIODIC=n

# Move RCU callbacks off isolated CPUs (pairs with rcu_nocbs= cmdline)
CONFIG_RCU_NOCB_CPU=y
CONFIG_RCU_NOCB_CPU_DEFAULT_ALL=n

# CPU isolation infrastructure
CONFIG_CPU_ISOLATION=y

# Force all IRQ handlers into preemptable kernel threads
CONFIG_IRQ_FORCED_THREADING=y

# RT primitives
CONFIG_RT_MUTEXES=y
CONFIG_PREEMPT_RCU=y
CONFIG_PREEMPT_NOTIFIERS=y

# Memory — disable compaction and KSM to avoid latency spikes
CONFIG_COMPACTION=n
CONFIG_KSM=n
CONFIG_TRANSPARENT_HUGEPAGE=n
