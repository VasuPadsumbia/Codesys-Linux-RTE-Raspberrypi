# BCM2712 / Cortex-A76 extras for Xenomai Cobalt — kernel 6.6 only
# Supplements shared xenomai-cobalt.cfg and xenomai-disable-features.cfg

# RP1 south bridge — required for RPi5 UART, SPI, I2C, GPIO peripherals
CONFIG_MFD_RP1=y
CONFIG_PINCTRL_RP1=y

# Built-in RTC (PCF85063A) — RPi5 only
CONFIG_RTC_DRV_PCF85063=y

# BCM2712 DVFS — also disabled in firmware (force_turbo=1) but belt-and-suspenders
CONFIG_CPU_FREQ=n
CONFIG_ARM_SCMI_CPUFREQ=n

# Disable memory management features that cause latency spikes on Cobalt CPUs
CONFIG_COMPACTION=n
CONFIG_KSM=n
CONFIG_TRANSPARENT_HUGEPAGE=n
CONFIG_DMA_CMA=n
