# CCLRTE Kernel Config Fragment — latency reduction
# Disables power management features that cause latency spikes

# Disable CPU idle states — C-states add wake-up latency
CONFIG_CPU_IDLE=n
CONFIG_ARM_CPUIDLE=n

# CPU frequency — use performance governor, disable others
CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
CONFIG_CPU_FREQ_GOV_PERFORMANCE=y
CONFIG_CPU_FREQ_GOV_POWERSAVE=n
CONFIG_CPU_FREQ_GOV_ONDEMAND=n
CONFIG_CPU_FREQ_GOV_CONSERVATIVE=n
CONFIG_CPU_FREQ_GOV_SCHEDUTIL=n

# Disable NUMA balancing (RPi4 is UMA but guard against future SoC)
CONFIG_NUMA_BALANCING=n

# BCM2711 hardware watchdog
CONFIG_BCM2835_WDT=y
CONFIG_WATCHDOG=y
CONFIG_WATCHDOG_CORE=y

# Tick broadcasting — needed for NO_HZ_FULL
CONFIG_GENERIC_CLOCKEVENTS=y
CONFIG_GENERIC_CLOCKEVENTS_BROADCAST=y
CONFIG_TICK_ONESHOT=y
