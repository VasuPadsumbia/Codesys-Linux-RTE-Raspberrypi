# WPA Supplicant configuration for wlan0 management interface
# WiFi credentials are populated from config/site.conf.sample at build time
# or reconfigured from the WebUI at http://<device-ip>:8080/network

ctrl_interface=DIR=/var/run/wpa_supplicant
update_config=1
country=IN
# brcmfmac (CYW43455 on RPi5) does not support scheduled scan offload
disable_scan_offload=1

# Network credentials — replace with your WiFi SSID and password
# These can be regenerated using: wpa_passphrase "MySSID" "MyPassword"
network={
    ssid="YOUR_WIFI_SSID"
    psk="YOUR_WIFI_PASSWORD"
    key_mgmt=WPA-PSK
    proto=WPA2
    pairwise=CCMP
    group=CCMP
    priority=5
}
